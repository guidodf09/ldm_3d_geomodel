# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  case_dir: "./"
  h5_file:  "../data/m_petrel.h5"
  vae_dir: "trained_vae"

# ─── Grid ─────────────────────────────────────────────────────────────────────
grid:
  Nx:        128
  Ny:        128
  Nz:        32
  Nx_latent: 16
  Ny_latent: 16
  Nz_latent: 4

# ─── Facies ───────────────────────────────────────────────────────────────────
facies:
  thresh1: 0.25
  thresh2: 0.80

# ─── Wells ────────────────────────────────────────────────────────────────────
wells:
  i1: [16,  16]
  i2: [16,  64]
  i3: [16, 112]
  i4: [64,  16]
  p1: [64,  64]
  p2: [64, 112]
  p3: [112,  16]
  p4: [112,  64]
  p5: [112, 112]

# ─── Data Split ───────────────────────────────────────────────────────────────
data_split:
  train_end:  2374
  val_start:  2374
  val_end:    2671
  test_end:   2968

# ─── VAE ──────────────────────────────────────────────────────────────────────
vae:
  spatial_dims:     3
  in_channels:      1
  out_channels:     1
  num_channels:     [64, 128, 256, 512]
  latent_channels:  1
  num_res_blocks:   1
  norm_num_groups:  16
  attention_levels: [false, false, false, true]

# ─── Discriminator ────────────────────────────────────────────────────────────
discriminator:
  spatial_dims:  3
  num_layers_d:  3
  num_channels:  32
  in_channels:   1
  out_channels:  1

# ─── Training ─────────────────────────────────────────────────────────────────
training:
  n_epochs:           1000
  batch_size:         8 # reduce if memory does not allow (or use multiple gpus)
  val_interval:       20
  save_interval:      50
  warm_up_epochs:     5
  seed:               0
  lr:                 0.0001
  perceptual_network: "squeeze" # or resnet50
  multi_gpu:        true # false for single gpu

# ─── Loss Weights ─────────────────────────────────────────────────────────────
loss_weights:
  kl:         0.000001
  perceptual: 0.001
  hd:         0.01
  adv:        0.01

# ─── Diffusion ────────────────────────────────────────────────────────────────
diffusion:
  n_train_timesteps: 1000
  schedule:          "scaled_linear_beta"
  beta_start:        0.0015
  beta_end:          0.0195
